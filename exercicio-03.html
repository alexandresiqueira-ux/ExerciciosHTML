<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <title>Grade Horária de Aulas do Módulo</title>
</head>
<body>

    <!-- MÓDULO 5: HORÁRIOS DAS AULAS -->
    <div class="bloco-cronograma">
        <h2 class="titulo-seccao">Horários Académicos</h2>

        <table border="1">
            <caption>Horário das aulas do módulo</caption>

            <thead>
                <tr>
                    <th scope="col">Aula</th>
                    <th scope="col">Horário</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>Estruturação Multimídia</td>
                    <td>19:00 - 20:30</td>
                </tr>
            </tbody>
        </table>

        <p>Recursos necessários:</p>

        <ul>
            <li>Computador com IDE configurada</li>
            <li>Arquivos de legenda (.vtt) prontos</li>
        </ul>
    </div>

    <hr>

    <!-- MÓDULO 6: CONTEÚDO INTEGRADO -->
    <div class="bloco-video">
        <h2>Apresentação da Disciplina</h2>

        <video src="apresentacao.mp4" type="video.mp4" controls>
           
            <track kind="captions" srclang="pt" label="Português">

            O seu navegador não suporta vídeos.
        </video>
    </div>

    <div class="bloco-mapa">
        <h2>Localização do Campus IFF</h2>

        <iframe
            src="https://mapas.iff.edu.br"
            title="Mapa de localização do Campus IFF"
            sandbox="allow-same-origin allow-scripts">
        </iframe>
    </div>

</body>
</html>
