<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="description" content="Entre em contato com a equipe de suporte backend da 365EVents. Envie suas dúvidas, mensagens ou problemas técnicos diretamente pelo nosso canal de atendimento.">
    <title>365EVents - Contato com o Suporte</title>
</head>
<body>

    <header>
        <h1 class="titulo">Área de Contato do Cliente</h1>
        <nav class="menu" aria-label="Navegação do cabeçalho">
            <a href="#">Ajuda</a> | <a href="#">Sair</a>
        </nav>
    </header>

    <main>
        <section aria-labelledby="topico-suporte">
            <h2 id="topico-suporte" class="subtitulo">Envie sua mensagem para a nossa equipe de suporte backend</h2>
            
            <form action="/enviar" method="POST" aria-describedby="legenda-formulario">
                <section class="conteudo-formulario">
                    <h3 id="legenda-formulario">Dados de Contato e Mensagem</h3>
                    
                    <article class="grupo-campo">
                        <label for="campo-nome">Nome:</label>
                        <input type="text" id="campo-nome" name="nome" required minlength="3">
                    </article>
                    
                    <article class="grupo-campo">
                        <label for="campo-email">Email:</label>
                        <input type="email" id="campo-email" name="email" required minlength="5">
                    </article>
                    
                    <article class="grupo-campo">
                        <label for="campo-celular">Telefone Celular:</label>
                        <input type="tel" id="campo-celular" name="celular" pattern="[0-9]{11}" required title="Digite exatamente 11 números consecutivos (incluindo o DDD).">
                    </article>
                    
                    <article class="grupo-campo">
                        <label for="campo-msg">Mensagem:</label>
                        <textarea id="campo-msg" name="msg" required minlength="10"></textarea>
                    </article>
                    
                    <button type="submit">Disparar Dados</button>
                </section>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Suporte Tech. Todos os direitos reservados.</p>
    </footer>

</body>
</html>
